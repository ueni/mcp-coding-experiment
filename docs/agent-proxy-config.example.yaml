# Sanitized non-runtime example only.
# Runtime user-specific config lives at .codebase-tooling-mcp/agent-proxy.yaml,
# which is ignored by git. Keep raw API keys in Continue secrets or environment
# variables; apiKey below is only a symbolic secret reference.
agent_proxy:
  enabled: true
  allow_online: false
  provider: model-fallback
  model: model-fallback
  apiBase: ""
  apiType: ""
  apiVersion: ""
  apiKey: ""

