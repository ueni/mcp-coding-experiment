services:
  codebase-tooling-mcp:
    build: .
    image: codebase-tooling-mcp:latest
    environment:
      MCP_TRANSPORT: http
      ALLOW_MUTATIONS: "true"
      REPO_PATH: /repo
      HOST: 0.0.0.0
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ../..:/repo
