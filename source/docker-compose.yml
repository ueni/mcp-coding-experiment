services:
  codebase-tooling-mcp:
    build: .
    image: codebase-tooling-mcp:latest
    environment:
      MCP_TRANSPORT: http
      ALLOW_MUTATIONS: "true"
      CONTINUE_OLLAMA_MODELS: ""
      OLLAMA_HOST: 127.0.0.1:11434
      OLLAMA_FALLBACK_HOST: 0.0.0.0:11434
      REPO_PATH: /repo
      HOST: 0.0.0.0
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ..:/repo
