name: Build Devcontainer Image

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_IMAGE: codebase-tooling-mcp:test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build --file source/Dockerfile --tag "${TEST_IMAGE}" source

      - name: Run tests with coverage in container
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "${GITHUB_WORKSPACE}:/work" \
            --workdir /work \
            --entrypoint /bin/bash \
            "${TEST_IMAGE}" \
            -lc 'coverage run -m pytest && coverage report -m && coverage xml -o coverage.xml'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to docker hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push devcontainer image
        run: |
          IMAGE_NAME="docker.io/${{ secrets.DOCKER_USERNAME }}/codebase-tooling-mcp"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file source/Dockerfile \
            --tag "${IMAGE_NAME}:latest" \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            --push \
            source
