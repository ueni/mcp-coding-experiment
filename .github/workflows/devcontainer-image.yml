name: Build Devcontainer Image

on:
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_image:
        description: Push the built devcontainer image to Docker Hub.
        required: false
        type: boolean
        default: false
      preload_ollama_models:
        description: Preload Ollama models into validation images. Published images always preload models.
        required: false
        type: boolean
        default: false
      preload_vscode_extensions:
        description: Preload VS Code extensions into validation images. Published images always preload extensions.
        required: false
        type: boolean
        default: false
      smoke_model_name:
        description: Optional installed Ollama model tag to use for the devcontainer smoke prompt. Empty means use the first installed model, or skip when none are installed.
        required: false
        type: string
        default: ""
      require_smoke_model_prompt:
        description: Fail instead of skipping when the smoke test cannot run a real local model prompt.
        required: false
        type: boolean
        default: false
      allow_smoke_ollama_pull:
        description: Allow runtime Ollama pulls during the smoke test. Keep false for pull-request validation.
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 180
    env:
      TEST_IMAGE: codebase-tooling-mcp:test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        timeout-minutes: 150
        env:
          PRELOAD_OLLAMA_MODELS: ${{ github.event_name == 'workflow_dispatch' && inputs.preload_ollama_models == true }}
        run: |
          ollama_preload_models=""
          if [ "${PRELOAD_OLLAMA_MODELS}" = "true" ]; then
            ollama_preload_models="$({ python3 - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(Path('.devcontainer/devcontainer.json').read_text())
          print(config.get('build', {}).get('args', {}).get('OLLAMA_PRELOAD_MODELS', ''))
          PY
          } | tr -d '\n')"
          fi

          docker build \
            --progress=plain \
            --build-arg "OLLAMA_PRELOAD_MODELS=${ollama_preload_models}" \
            --build-arg VSCODE_PRELOAD_EXTENSIONS= \
            --file source/Dockerfile \
            --tag "${TEST_IMAGE}" \
            source

      - name: Record Docker resource baseline
        run: |
          scripts/monitor_runtime_resources.py --image "${TEST_IMAGE}" --json | tee docker-resource-baseline.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          metrics = json.loads(Path("docker-resource-baseline.json").read_text())
          print(
              "Docker resource baseline: "
              f"image_size_mib={metrics['image_size_mib']}, "
              f"startup_memory_mib={metrics['startup_memory_mib']}, "
              f"health_ok={metrics['health_ok']}"
          )
          PY

      - name: Upload Docker resource baseline
        uses: actions/upload-artifact@v4
        with:
          name: docker-resource-baseline
          path: docker-resource-baseline.json

      - name: Run VS Code devcontainer smoke test
        timeout-minutes: 15
        env:
          MCP_SMOKE_REQUIRE_MODEL_PROMPT: ${{ github.event_name == 'workflow_dispatch' && inputs.require_smoke_model_prompt == true }}
          MCP_SMOKE_MODEL_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_model_name || '' }}
          OLLAMA_ALLOW_PULL: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_smoke_ollama_pull == true }}
          MCP_SMOKE_SERVER_STARTUP_TIMEOUT_SECONDS: "90"
          MCP_SMOKE_MODEL_TIMEOUT_SECONDS: "30"
        run: scripts/devcontainer_smoke_test.py --image "${TEST_IMAGE}"

      - name: Run tests with coverage in container
        run: |
          CONTAINER_NAME="codebase-tooling-mcp-test-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          trap 'docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true' EXIT

          docker create \
            --name "${CONTAINER_NAME}" \
            --user root \
            --privileged \
            --security-opt seccomp=unconfined \
            --security-opt apparmor=unconfined \
            --env HOME=/root \
            --env USER=app \
            --env LOGNAME=app \
            --env REPO_PATH=/home/app/work \
            --env COVERAGE_FILE=/tmp/.coverage \
            --volume "${GITHUB_WORKSPACE}:/src:ro" \
            --workdir /home/app \
            --entrypoint /bin/bash \
            "${TEST_IMAGE}" \
            -lc 'mkdir -p /home/app/work && cp -R /src/. /home/app/work/ && cd /home/app/work && coverage run -m pytest -p no:cacheprovider && coverage report -m && coverage xml -o /tmp/coverage.xml && coverage json -o /tmp/coverage.json'

          docker start -a "${CONTAINER_NAME}"
          docker cp "${CONTAINER_NAME}:/tmp/coverage.xml" "${GITHUB_WORKSPACE}/coverage.xml"
          docker cp "${CONTAINER_NAME}:/tmp/coverage.json" "${GITHUB_WORKSPACE}/coverage.json"

      - name: Warn on low coverage
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          total = json.loads(Path("coverage.json").read_text())["totals"]["percent_covered_display"]
          percent = float(total)
          target = 90.0
          if percent < target:
              print(f"::warning::Coverage warning: total of {percent:.0f} is less than target={target:.0f}")
          PY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-and-push:
    needs: test
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare temp directory
        run: |
          mkdir -p "${RUNNER_TEMP}"
          df -h "${RUNNER_TEMP}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        env:
          TMPDIR: ${{ runner.temp }}

      - name: Decide image build mode
        id: image-mode
        run: |
          if [ "${{ github.event_name }}" = "release" ] || [ "${{ inputs.publish_image || false }}" = "true" ]; then
            echo "publish=true" >>"${GITHUB_OUTPUT}"
          else
            echo "publish=false" >>"${GITHUB_OUTPUT}"
          fi

          if [ "${{ github.event_name }}" = "release" ] || [ "${{ inputs.publish_image || false }}" = "true" ] || [ "${{ inputs.preload_ollama_models || false }}" = "true" ]; then
            echo "preload_ollama=true" >>"${GITHUB_OUTPUT}"
          else
            echo "preload_ollama=false" >>"${GITHUB_OUTPUT}"
          fi

          if [ "${{ github.event_name }}" = "release" ] || [ "${{ inputs.publish_image || false }}" = "true" ] || [ "${{ inputs.preload_vscode_extensions || false }}" = "true" ]; then
            echo "preload_vscode=true" >>"${GITHUB_OUTPUT}"
          else
            echo "preload_vscode=false" >>"${GITHUB_OUTPUT}"
          fi

      - name: Login to docker hub
        if: steps.image-mode.outputs.publish == 'true'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build devcontainer image
        timeout-minutes: 330
        env:
          IMAGE_NAME: docker.io/${{ secrets.DOCKER_USERNAME }}/codebase-tooling-mcp
        run: |
          build_args=()
          output_args=(--load)
          tag_args=(--tag "codebase-tooling-mcp:${GITHUB_SHA}")

          if [ "${{ steps.image-mode.outputs.preload_ollama }}" != "true" ]; then
            build_args+=(--build-arg OLLAMA_PRELOAD_MODELS=)
          fi

          if [ "${{ steps.image-mode.outputs.preload_vscode }}" != "true" ]; then
            build_args+=(--build-arg VSCODE_PRELOAD_EXTENSIONS=)
          fi

          if [ "${{ steps.image-mode.outputs.publish }}" = "true" ]; then
            output_args=(--push)
            tag_args=(--tag "${IMAGE_NAME}:latest" --tag "${IMAGE_NAME}:${GITHUB_SHA}")
          fi

          docker buildx build \
            --progress=plain \
            --platform linux/amd64 \
            --file source/Dockerfile \
            "${build_args[@]}" \
            "${tag_args[@]}" \
            "${output_args[@]}" \
            source
