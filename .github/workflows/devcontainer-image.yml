name: Build Devcontainer Image

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_IMAGE: codebase-tooling-mcp:test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build --file source/Dockerfile --tag "${TEST_IMAGE}" source

      - name: Run tests with coverage in container
        run: |
          CONTAINER_NAME="codebase-tooling-mcp-test-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          trap 'docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true' EXIT

          docker create \
            --name "${CONTAINER_NAME}" \
            --security-opt seccomp=unconfined \
            --security-opt apparmor=unconfined \
            --env HOME=/home/app \
            --env USER=app \
            --env LOGNAME=app \
            --env REPO_PATH=/tmp/work \
            --env COVERAGE_FILE=/tmp/.coverage \
            --volume "${GITHUB_WORKSPACE}:/src:ro" \
            --workdir /tmp/work \
            --entrypoint /bin/bash \
            "${TEST_IMAGE}" \
            -lc 'mkdir -p /tmp/work && cp -R /src/. /tmp/work/ && cd /tmp/work && coverage run -m pytest -p no:cacheprovider && coverage report -m && coverage xml -o /tmp/coverage.xml && coverage json -o /tmp/coverage.json'

          docker start -a "${CONTAINER_NAME}"
          docker cp "${CONTAINER_NAME}:/tmp/coverage.xml" "${GITHUB_WORKSPACE}/coverage.xml"
          docker cp "${CONTAINER_NAME}:/tmp/coverage.json" "${GITHUB_WORKSPACE}/coverage.json"

      - name: Warn on low coverage
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          total = json.loads(Path("coverage.json").read_text())["totals"]["percent_covered_display"]
          percent = float(total)
          target = 90.0
          if percent < target:
              print(f"::warning::Coverage warning: total of {percent:.0f} is less than target={target:.0f}")
          PY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to docker hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push devcontainer image
        run: |
          IMAGE_NAME="docker.io/${{ secrets.DOCKER_USERNAME }}/codebase-tooling-mcp"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file source/Dockerfile \
            --tag "${IMAGE_NAME}:latest" \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            --push \
            source
